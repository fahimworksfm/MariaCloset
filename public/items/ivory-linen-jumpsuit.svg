<svg width="600" height="800" viewBox="0 0 600 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ECE6DA"/>
      <stop offset="1" stop-color="#FBF6EE"/>
    </linearGradient>
    <radialGradient id="spot" cx="0.5" cy="0.26" r="0.62">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cloth" x1="0.1" y1="0" x2="0.9" y2="1">
      <stop offset="0" stop-color="#F4ECDD"/>
      <stop offset="1" stop-color="#E0D2B8"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" fill="url(#bg)"/>
  <rect width="600" height="800" fill="url(#spot)"/>
  <ellipse cx="300" cy="710" rx="140" ry="24" fill="#211C16" opacity="0.10"/>
  <!-- halter bodice -->
  <path d="M300,168 L334,250 C346,300 348,320 350,348 L250,348 C252,320 254,300 266,250 Z" fill="url(#cloth)" stroke="#D8C7A6" stroke-width="2"/>
  <!-- waist + wide legs -->
  <path d="M250,348 L350,348 L366,420 L312,690 L288,690 L300,440 L312,420 L288,420 L300,440 L288,690 L234,690 Z" fill="url(#cloth)" stroke="#D8C7A6" stroke-width="2"/>
  <!-- neck strap -->
  <path d="M300,168 C292,140 308,140 300,168" fill="none" stroke="#D8C7A6" stroke-width="6"/>
  <line x1="300" y1="120" x2="300" y2="170" stroke="#D8C7A6" stroke-width="5"/>
  <!-- belt -->
  <rect x="250" y="378" width="100" height="16" rx="4" fill="#D8C7A6"/>
  <path d="M300,168 L324,250 L312,348 L300,348 Z" fill="#ffffff" opacity="0.25"/>
</svg>
